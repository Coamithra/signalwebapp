<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Signal</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%233a76f0'/%3E%3Cpath fill='%23fff' d='M16 7C21.5 7 26 10.8 26 15.5C26 20.2 21.5 24 16 24C14.6 24 13.2 23.75 12 23.3L7 25.5L8.5 20.2C7.3 18.8 6 17.3 6 15.5C6 10.8 10.5 7 16 7Z'/%3E%3Cpolyline points='12.6,12.7 15.4,15.4 12.6,18.1' fill='none' stroke='%233a76f0' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cline x1='17' y1='18.4' x2='21' y2='18.4' stroke='%233a76f0' stroke-width='1.8' stroke-linecap='round'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Sidebar -->
      <aside class="sidebar">
        <header class="sidebar-header">
          <div class="brand">
            <span class="logo"></span>
            <span>Signal</span>
          </div>
          <div class="status" id="status" title="Connection status">
            <span class="status-dot" id="statusDot"></span>
          </div>
        </header>
        <div class="search-wrap">
          <input id="search" class="search" type="text" placeholder="Search chats" autocomplete="off" />
        </div>
        <div class="conversation-list" id="conversationList"></div>
      </aside>

      <!-- Main thread -->
      <main class="thread" id="thread">
        <div class="empty-state" id="emptyState">
          <div class="empty-logo"></div>
          <h2>Signal</h2>
          <p>Select a chat to start messaging.</p>
          <p class="empty-sub" id="emptySub"></p>
        </div>

        <section class="conversation-view hidden" id="conversationView">
          <header class="thread-header">
            <div class="thread-avatar" id="threadAvatar"></div>
            <div class="thread-title-wrap">
              <div class="thread-title" id="threadTitle"></div>
              <div class="thread-subtitle" id="threadSubtitle"></div>
            </div>
            <div class="thread-menu">
              <button id="threadMenuBtn" class="thread-menu-btn" title="Chat options" aria-label="Chat options" aria-haspopup="true" aria-expanded="false">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
              </button>
              <div id="threadMenu" class="thread-menu-pop hidden" role="menu"></div>
            </div>
          </header>

          <div class="messages" id="messages">
            <button class="load-older hidden" id="loadOlder">Load older messages</button>
            <div id="messagesInner"></div>
            <!-- Transient, local-only auto-TLDR status bubble (filled by app.js).
                 Sits outside #messagesInner so message refreshes never wipe it. -->
            <div id="tldrStatus" class="tldr-status hidden"></div>
          </div>

          <footer class="composer">
            <div id="editBanner" class="edit-banner hidden">
              <svg class="edit-banner-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
              <span class="edit-banner-text">Editing message</span>
              <button id="editCancel" class="edit-banner-cancel" title="Cancel edit (Esc)" aria-label="Cancel edit">&times;</button>
            </div>
            <div id="attachTray" class="attach-tray hidden"></div>
            <div class="composer-row">
              <input id="fileInput" type="file" multiple hidden />
              <button id="attachBtn" class="attach-btn" title="Attach files" aria-label="Attach files">
                <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              </button>
              <button id="gifBtn" class="gif-btn" title="Send a GIF (type /gif)" aria-label="Send a GIF">GIF</button>
              <textarea
                id="composerInput"
                class="composer-input"
                rows="1"
                placeholder="Message"
              ></textarea>
              <button id="sendBtn" class="send-btn" title="Send" aria-label="Send">
                <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M3.4 20.4 22 12 3.4 3.6 3 10l13 2-13 2z"/></svg>
              </button>
            </div>
          </footer>

          <div id="dropOverlay" class="drop-overlay hidden">
            <div class="drop-inner">
              <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M7 9l5-5 5 5"/><path d="M5 16v3a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-3"/></svg>
              <div>Drop files to send</div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
